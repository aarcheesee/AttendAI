<!DOCTYPE html>
<html>
<head>
<title>Attendance</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h2>Attendance Records</h2>

<table>
<tr>
<th>Name</th>
<th>Lecture</th>
<th>Date</th>
<th>Time</th>
</tr>

{% for row in rows %}
<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
