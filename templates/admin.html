<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>⚙️ Admin</h2>

        <a href="/dashboard">Dashboard</a>
        <a href="/admin">Users</a>
        <a href="/logout">Logout</a>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <h1>Admin Panel</h1>
<form action="/admin_add_user" method="post" style="margin-bottom:20px;">
    <input type="text" name="username" placeholder="Username" required>
    <input type="text" name="password" placeholder="Password" required>
    <button class="btn success">Add User</button>
</form>
        <div class="table-box">
            <table>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Action</th>
                </tr>

                {% for user in users %}
                <tr>
                    <td>{{user[0]}}</td>
                    <td>{{user[1]}}</td>
                    <td>
                        {% if user[1] != "admin" %}
                        <form action="/delete_user/{{user[0]}}" method="post" style="display:inline;">
    <button class="btn" style="background:#dc2626; color:white;">
        Delete
    </button>
</form>
                        {% else %}
                        <span>Protected</span>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}

            </table>
        </div>

    </div>

</div>

</body>
</html>
